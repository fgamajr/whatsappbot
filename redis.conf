# Redis configuration for WhatsApp Interview Bot with Celery

# Basic Configuration
port 6379
bind 0.0.0.0
timeout 0
tcp-keepalive 60

# Memory Management
# Set max memory (adjust based on your server capacity)
# maxmemory 512mb

# CRITICAL FOR CELERY: Never evict keys to prevent task loss
maxmemory-policy noeviction

# Persistence Configuration
# Enable AOF for durability - Celery tasks will survive restarts
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Disable RDB snapshots since we're using AOF
save ""

# Database Configuration
databases 16  # Allow multiple DBs for separation:
              # DB 0: Rate limiting (existing)
              # DB 1: Celery broker
              # DB 2: Celery results
              # DB 3+: Available for future use

# Performance Tuning
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Memory optimizations for Celery
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# Disable potentially dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command SHUTDOWN SHUTDOWN_REDIS_SERVER

# Slow log configuration
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client timeout
timeout 300

# Log level
loglevel notice

# Enable keyspace notifications for monitoring
notify-keyspace-events Ex

# Security (uncomment and set password in production)
# requirepass your_secure_password_here

# Client connections
maxclients 10000

# Memory policy for different use cases
# For rate limiting (DB 0): Keep keys until TTL expires
# For Celery broker (DB 1): Never evict - tasks must be processed
# For Celery results (DB 2): Can evict LRU if needed, but prefer larger memory